<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Marketplace</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="marketplace.css">
</head>

<body>
<div id="toast" class="toast"></div>
<nav>
  <div class="logo">MARKET</div>
  <div class="cart-btn" onclick="toggleCart()">
    🛒 (<span id="count">0</span>)
  </div>
</nav>

<section class="hero">
  <h1>Rand Bazaar</h1>
  <p class="slogan">The Randa We Gonna Supply Is Of High Quality</p>
    <p class="slogan">काढा तुमचा दांडा झवा आमच्या रांडा</p>

</section>

<section class="products" id="productList"></section>

<!-- CART -->
<div class="cart" id="cart">
  <h2>Your Cart</h2>

  <!-- FIX: missing class -->
  <div id="cartItems" class="cart-items"></div>

  <p id="checkoutMsg" class="checkout-msg"></p>

  <button class="btn" onclick="checkout()">Checkout</button>
</div>

<div class="cart-overlay" onclick="toggleCart()"></div>

<footer>
  © 2026 Premium Rand Bazaar
</footer>

<script src="marketplace.js"></script>
</body>
</html>
